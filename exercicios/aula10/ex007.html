<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somando Numeros</title>
</head>
<body>
    <h1>Somando Valores</h1>
<input type="number" id="txtn1"> +
<input type="number" id="txtn2">
<input type="button" value="Somar" id="btn">  <!-- adicionei id aqui -->
<div id="res">Resultado</div>

<script>
    let btn = document.querySelector('#btn')  // selecionei o botão
    btn.addEventListener('click', somar)       // adicionei o evento
    function somar() {
        let tn1 = document.querySelector('#txtn1')
        let tn2 = document.querySelector('#txtn2')
        let res = document.querySelector('#res')
        let n1 = Number(tn1.value)
        let n2 = Number(tn2.value)
        let s = n1 + n2
        res.innerHTML = `A soma de ${n1} + ${n2} e igual a ${s}`
    }
</script>
</body>
</html>
